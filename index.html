<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="description" content="沖繩家族旅行 2026 — 五天四夜完整行程規劃">
    <meta name="theme-color" content="#F7F4EE">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>沖繩 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2242%22 fill=%22none%22 stroke=%22%23D94A3D%22 stroke-width=%228%22/><path d=%22M20,55 Q35,35 50,55 T80,55%22 fill=%22none%22 stroke=%22%231F6F73%22 stroke-width=%227%22 stroke-linecap=%22round%22/></svg>">

    <link rel="stylesheet" href="index.css?v=3">
</head>

<body>
    <div class="loader-overlay" id="pageLoader">
        <div class="loader-logo"><span>OKINAWA</span></div>
        <div class="loader-bar"></div>
        <div class="loader-tagline">OKINAWA · 2026</div>
    </div>

    <noscript>
        <div style="position:fixed;inset:0;background:#F7F4EE;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:99999;padding:2rem;text-align:center;">
            <h1 style="font-family:serif;font-style:italic;font-size:2.5rem;color:#1C1C1A;">Okinawa<span style="color:#D94A3D">.</span></h1>
            <p style="color:#5C5A55;font-size:1rem;line-height:1.7;max-width:360px;">這份旅行計畫需要 JavaScript 才能瀏覽。請啟用 JavaScript 後重新整理頁面。</p>
        </div>
    </noscript>

    <div id="app">
        <header class="top-bar" id="topBar">
            <div class="brand" id="brandHome">
                <span class="brand-mark"></span>
                <span class="brand-text">OKINAWA 2026</span>
            </div>
            <div class="top-day-nav" id="topDayNav">
                <div class="top-day-track" id="topDayTrack"></div>
            </div>
            <div class="top-actions">
                <div class="sync-indicator" id="syncIndicator" data-state="saved" title="已同步">
                    <span class="sync-dot"></span>
                    <span class="sync-label" id="syncLabel">已同步</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="hero" id="heroSection">
                <div class="hero-image-wrap">
                    <img class="hero-image" src="assets/hero.jpg" alt="沖繩海景" loading="eager"
                        onerror="this.style.display='none'">
                    <div class="hero-image-tint"></div>
                </div>
                <div class="container hero-content">
                    <p class="hero-eyebrow">2026.08.13 — 08.17 . 沖繩</p>
                    <h1 class="hero-title">Okinawa<br>Trip<span class="dot">.</span></h1>

                    <div class="dashboard-panel">
                        <div class="countdown-group" id="countdownGroup">
                            <!-- JS will populate with countdown-before / countdown-during / countdown-after -->
                        </div>
                        <div class="travelers-list" id="heroTravelers"></div>
                    </div>
                </div>
            </section>

            <div class="day-nav-container">
                <div class="day-perf-top"></div>
                <div class="day-nav-track" id="dayTabsTrack"></div>
                <div class="day-perf-bot"></div>
            </div>

            <div class="container schedule-container" id="scheduleContainer"></div>
        </main>

        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item primary" id="btnFab" title="新增活動">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"
                    stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>新增活動</span>
            </button>
        </nav>

        <div class="modal-overlay" id="activityModal">
            <div class="modal">
                <div class="modal-drag-handle"></div>
                <div class="modal-header">
                    <h2 class="modal-title" id="modalTitle">新增活動</h2>
                    <button class="icon-btn modal-close" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body" data-lenis-prevent>
                    <form id="activityForm" class="clean-form" autocomplete="off">
                        <div class="form-group">
                            <label class="form-label">日期</label>
                            <div class="day-chips" id="dayChips"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actTitle">活動名稱 *</label>
                            <input class="form-input" type="text" id="actTitle" placeholder="例：美麗海水族館" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="actStartTime">起始時間</label>
                                <input class="form-input" type="time" id="actStartTime">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="actEndTime">結束時間</label>
                                <input class="form-input" type="time" id="actEndTime">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actDesc">備註/說明</label>
                            <input class="form-input" type="text" id="actDesc" placeholder="例：樂桃航空 MM930（選填）">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actMapUrl">地標連結 (Google Maps)</label>
                            <input class="form-input" type="url" id="actMapUrl"
                                placeholder="https://maps.app.goo.gl/...">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-cancel" type="button">取消</button>
                    <button class="btn btn-primary modal-save" type="button">儲存</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="deleteModal">
            <div class="modal modal-confirm">
                <div class="confirm-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg></div>
                <h3 class="confirm-title">確定要刪除嗎？</h3>
                <p class="confirm-desc">此操作無法復原</p>
                <div class="confirm-actions">
                    <button class="btn btn-outline" id="btnDeleteCancel">取消</button>
                    <button class="btn btn-danger" id="btnDeleteConfirm">刪除</button>
                </div>
            </div>
        </div>

        <div class="toast-container" id="toastContainer"></div>

        <button class="back-to-top" id="backToTop" title="回到頂端" aria-label="回到頂端">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15" />
            </svg>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
