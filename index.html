<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="description" content="沖繩家族旅行 2026 — 五天四夜完整行程規劃">
    <meta name="theme-color" content="#F3EFE8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0A0A10" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>沖繩 2026 — 行程共筆</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2242%22 fill=%22%23C04528%22/></svg>">

    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="app">

        <header class="top-bar" id="topBar">
            <div class="brand">
                <span class="brand-text"><span class="brand-full">OKINAWA</span><span class="brand-short">O</span></span>
            </div>
            <nav class="day-nav">
                <div class="day-nav-track" id="dayTabsTrack"></div>
            </nav>
            <div class="top-actions">
                <div class="sync-indicator" id="syncIndicator" data-state="saved" title="已同步">
                    <span class="sync-dot"></span>
                    <span class="sync-label" id="syncLabel">已同步</span>
                </div>
                <button class="icon-btn btn-theme" id="btnTheme" title="切換主題" aria-label="切換深色模式">
                    <svg class="theme-icon-light" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                        stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
                        style="display: block;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="theme-icon-dark" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                        stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
                        style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main class="main-content">

            <section class="hero" id="heroSection">
                <div class="hero-glow hero-glow--coral"></div>
                <div class="hero-glow hero-glow--ocean"></div>
                <div class="hero-content">
                    <h1 class="hero-title">Okinawa</h1>
                </div>

                <div class="dashboard-panel">
                    <div class="countdown-group" id="countdownGroup">
                        <div class="countdown-block"><span class="val" id="countDays">-</span><span
                                class="lbl">天</span></div>
                        <div class="countdown-block"><span class="val" id="countHours">-</span><span
                                class="lbl">時</span></div>
                        <div class="countdown-block"><span class="val" id="countMins">-</span><span
                                class="lbl">分</span></div>
                        <div class="countdown-block"><span class="val" id="countSecs">-</span><span
                                class="lbl">秒</span></div>
                    </div>
                    <div class="travelers-list" id="heroTravelers"></div>
                </div>
            </section>

            <div class="schedule-container" id="scheduleContainer"></div>
        </main>

        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item active" id="navHome">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="1.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>行程</span>
            </button>
            <button class="nav-item" id="btnFab" title="新增活動">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                    fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>新增</span>
            </button>
        </nav>

        <div class="modal-overlay" id="activityModal">
            <div class="modal">
                <div class="modal-header">
                    <h2 class="modal-title" id="modalTitle">新增活動</h2>
                    <button class="icon-btn modal-close" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="activityForm" class="clean-form">
                        <div class="form-group">
                            <label class="form-label">日期</label>
                            <div class="day-chips" id="dayChips"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actTitle">活動名稱 *</label>
                            <input class="form-input" type="text" id="actTitle" placeholder="例：美麗海水族館"
                                required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="actCategory">類別</label>
                                <select class="form-select" id="actCategory">
                                    <option value="sightseeing">🏛 觀光</option>
                                    <option value="food">🍜 美食</option>
                                    <option value="shopping">🛍 購物</option>
                                    <option value="transport">✈️ 交通</option>
                                    <option value="hotel">🏨 住宿</option>
                                    <option value="leisure">😊 休閒</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="actPeriod">時段</label>
                                <select class="form-select" id="actPeriod" required>
                                    <option value="上午">☀️ 上午</option>
                                    <option value="下午">🌤 下午</option>
                                    <option value="傍晚">🌇 傍晚</option>
                                    <option value="晚上">🌙 晚上</option>
                                    <option value="夜間">🌃 夜間</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actDesc">備註</label>
                            <input class="form-input" type="text" id="actDesc" placeholder="補充說明（選填）">
                        </div>
                        <!-- Hidden fields for advanced edit -->
                        <input type="hidden" id="actTime" value="">
                        <input type="hidden" id="actMapUrl" value="">
                        <input type="hidden" id="actNotes" value="">
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-cancel" type="button">取消</button>
                    <button class="btn btn-primary modal-save" type="button">儲存</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="deleteModal">
            <div class="modal modal-confirm">
                <div class="confirm-icon">🗑️</div>
                <h3 class="confirm-title">確定要刪除嗎？</h3>
                <p class="confirm-desc">此操作無法復原</p>
                <div class="confirm-actions">
                    <button class="btn btn-outline" id="btnDeleteCancel">取消</button>
                    <button class="btn btn-danger" id="btnDeleteConfirm">刪除</button>
                </div>
            </div>
        </div>

        <div class="toast-container" id="toastContainer"></div>
    </div>
    <script src="app.js"></script>
</body>

</html>
