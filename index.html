<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Okinawa 2026">
    <meta name="theme-color" content="#F9F9F9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Okinawa 2026</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Favicon (Minimal SVG) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22none%22 stroke=%22%23111%22 stroke-width=%228%22/><path d=%22M25,50 Q50,25 75,50 T125,50%22 fill=%22none%22 stroke=%22%23111%22 stroke-width=%228%22/></svg>">

    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- ═══════════════ App Container ═══════════════ -->
    <div id="app">

        <!-- Top App Bar (Mobile & Desktop) -->
        <header class="top-bar">
            <div class="brand">
                <span class="brand-text">OKINAWA</span>
                <span class="brand-sub">2026年8月</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn btn-theme" title="切換主題" aria-label="切換深色模式">
                    <!-- SVG Icon inserted by JS based on theme -->
                    <svg class="theme-icon-light" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                        stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
                        style="display: block;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="theme-icon-dark" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                        stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
                        style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- ═══════════════ Hero Section ═══════════════ -->
            <section class="hero">
                <div class="hero-content">
                    <h1 class="hero-title">Okinawa<br><em>輕旅</em></h1>
                    <div class="hero-meta">
                        <span>五天</span> <span class="dot">•</span> <span>四夜</span>
                    </div>
                </div>

                <div class="dashboard-panel">
                    <div class="countdown-group">
                        <div class="countdown-block"><span class="val" id="countDays">-</span><span
                                class="lbl">天</span></div>
                        <div class="countdown-block"><span class="val" id="countHours">-</span><span
                                class="lbl">時</span></div>
                        <div class="countdown-block"><span class="val" id="countMins">-</span><span
                                class="lbl">分</span></div>
                        <div class="countdown-block"><span class="val" id="countSecs">-</span><span
                                class="lbl">秒</span></div>
                    </div>
                    <div class="travelers-list" id="heroTravelers">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </section>

            <!-- ═══════════════ Day Navigation ═══════════════ -->
            <nav class="day-nav">
                <div class="day-nav-track" id="dayTabsTrack">
                    <!-- Rendered by JS -->
                </div>
            </nav>

            <!-- ═══════════════ Schedule View ═══════════════ -->
            <div class="schedule-container" id="scheduleContainer">
                <!-- Day views rendered by JS -->
            </div>
        </main>

        <!-- ═══════════════ Bottom Navigation (Mobile First) ═══════════════ -->
        <nav class="bottom-nav">
            <button class="nav-item active" id="navHome">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>行程</span>
            </button>
            <button class="nav-item btn-add-fab" title="新增活動">
                <div class="fab-inner">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </div>
            </button>
            <button class="nav-item btn-edit-toggle" id="navEdit">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span>編輯</span>
            </button>
        </nav>

        <!-- ═══════════════ Modals ═══════════════ -->
        <div class="modal-overlay" id="activityModal">
            <div class="modal">
                <div class="modal-header">
                    <h2 class="modal-title">活動</h2>
                    <button class="icon-btn modal-close" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="activityForm" class="clean-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="actPeriod">時段</label>
                                <select class="form-select" id="actPeriod" required>
                                    <option value="上午">上午</option>
                                    <option value="下午">下午</option>
                                    <option value="傍晚">傍晚</option>
                                    <option value="晚上">晚上</option>
                                    <option value="夜間">夜間</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="actTime">時間</label>
                                <input class="form-input" type="text" id="actTime" placeholder="例：09:00–17:00">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actTitle">活動名稱 *</label>
                            <input class="form-input" type="text" id="actTitle" placeholder="例：美麗海水族館" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actDesc">說明</label>
                            <textarea class="form-input" id="actDesc" placeholder="活動描述或注意事項..." rows="2"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="actCategory">類別</label>
                                <select class="form-select" id="actCategory">
                                    <option value="sightseeing">觀光景點</option>
                                    <option value="food">美食餐廳</option>
                                    <option value="shopping">購物逛街</option>
                                    <option value="transport">交通移動</option>
                                    <option value="hotel">住宿休息</option>
                                    <option value="leisure">休閒體驗</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="actMapUrl">Google Maps</label>
                                <input class="form-input" type="url" id="actMapUrl"
                                    placeholder="https://maps.app.goo.gl/...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actNotes">備註</label>
                            <textarea class="form-input" id="actNotes" placeholder="個人備註..."
                                rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline modal-cancel" type="button">取消</button>
                    <button class="btn btn-solid modal-save" type="button">儲存</button>
                </div>
            </div>
        </div>

        <!-- ═══════════════ Toast Container ═══════════════ -->
        <div class="toast-container" id="toastContainer"></div>
    </div>
    <script src="app.js"></script>
</body>

</html>
