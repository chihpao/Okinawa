<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="2026年8月沖繩家族旅行行程規劃 — 五天四夜輕旅行，探索沖繩的海洋、美食與文化">
    <meta name="theme-color" content="#006D77">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>☀ 8月沖繩輕旅 ☀ — 行程規劃</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Favicon (ocean emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">

        <!-- ═══════════════ Navigation Bar ═══════════════ -->
        <header class="nav-bar">
            <div class="nav-brand">
                <span class="nav-brand-icon">🌊</span>
                <span class="nav-brand-text">沖繩輕旅</span>
            </div>
            <!-- 右側：編輯模式切換 -->
            <div class="nav-actions">
                <button class="btn-icon btn-edit" title="編輯行程" aria-label="切換編輯模式">
                    <span>✏️</span>
                </button>
                <button class="btn-icon btn-theme" title="切換主題" aria-label="切換深色模式">
                    <span>🌙</span>
                </button>
            </div>
        </header>

        <!-- ═══════════════ Hero Section ═══════════════ -->
        <section class="hero">
            <h1 class="hero-title">☀ 8月沖繩輕旅 ☀</h1>
            <p class="hero-subtitle">2026 · 五天四夜 · 沖繩</p>

            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value" id="countDays">--</div>
                    <div class="countdown-label">天</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="countHours">--</div>
                    <div class="countdown-label">時</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="countMins">--</div>
                    <div class="countdown-label">分</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="countSecs">--</div>
                    <div class="countdown-label">秒</div>
                </div>
            </div>

            <div class="hero-travelers">
                <!-- Rendered by JS -->
            </div>
        </section>

        <!-- ═══════════════ Day Tabs ═══════════════ -->
        <nav class="day-tabs">
            <div class="day-tabs-track">
                <!-- Rendered by JS -->
            </div>
        </nav>

        <!-- ═══════════════ Main Content ═══════════════ -->
        <main class="main-content">
            <!-- Day views rendered by JS -->
        </main>

        <!-- ═══════════════ FAB ═══════════════ -->
        <button class="fab" title="新增活動" aria-label="新增活動">
            <span>＋</span>
        </button>

        <!-- ═══════════════ Activity Modal ═══════════════ -->
        <div class="modal-overlay" id="activityModal">
            <div class="modal">
                <div class="modal-header">
                    <h2 class="modal-title">新增活動</h2>
                    <button class="btn-icon modal-close" aria-label="關閉">
                        <span>✕</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="activityForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="actPeriod">時段</label>
                                <select class="form-select" id="actPeriod" required>
                                    <option value="上午">☀️ 上午</option>
                                    <option value="下午">🌤️ 下午</option>
                                    <option value="傍晚">🌇 傍晚</option>
                                    <option value="晚上">🌙 晚上</option>
                                    <option value="夜間">🌃 夜間</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="actTime">時間</label>
                                <input class="form-input" type="text" id="actTime" placeholder="例：09:00–17:00">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actTitle">活動名稱 *</label>
                            <input class="form-input" type="text" id="actTitle" placeholder="例：美麗海水族館" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actDesc">說明</label>
                            <textarea class="form-textarea" id="actDesc" placeholder="活動描述或注意事項..." rows="2"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="actCategory">類別</label>
                                <select class="form-select" id="actCategory">
                                    <option value="sightseeing">🏯 觀光景點</option>
                                    <option value="food">🍽️ 美食餐廳</option>
                                    <option value="shopping">🛍️ 購物逛街</option>
                                    <option value="transport">✈️ 交通移動</option>
                                    <option value="hotel">🏨 住宿休息</option>
                                    <option value="leisure">🌅 休閒體驗</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="actMapUrl">Google Maps</label>
                                <input class="form-input" type="url" id="actMapUrl" placeholder="https://maps.app.goo.gl/...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="actNotes">備註</label>
                            <textarea class="form-textarea" id="actNotes" placeholder="個人備註..." rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary modal-cancel" type="button">取消</button>
                    <button class="btn btn-primary modal-save" type="button">儲存</button>
                </div>
            </div>
        </div>

        <!-- ═══════════════ Toast Container ═══════════════ -->
        <div class="toast-container"></div>

        <!-- ═══════════════ Footer ═══════════════ -->
        <footer class="footer">
            <p>☀ 8月沖繩輕旅 ☀ — 一起享受沖繩的海洋與陽光 🌊</p>
        </footer>

    </div>

    <script src="app.js"></script>
</body>
</html>
